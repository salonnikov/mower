# ТОЛЬКО ЧТЕНИЕ. GD32F305 по SWD. mem2array+echo (mdw молчит в скрипте). halt->read->resume.
adapter driver bcm2835gpio
bcm2835gpio_peripheral_base 0x3F000000
bcm2835gpio_speed_coeffs 146203 36
bcm2835gpio_swd_nums 25 24
transport select swd
adapter speed 100
swd newdap chip cpu -enable
dap create chip.dap -chain-position chip.cpu
target create chip.cpu cortex_m -dap chip.dap
init
halt
mem2array a 32 0xE000ED00 1 ; echo [format "CPUID(E000ED00) = 0x%08x" $a(0)]
mem2array b 32 0xE0042000 1 ; echo [format "DBG_ID(E0042000) = 0x%08x" $b(0)]
mem2array c 32 0x1FFFF7E0 1 ; echo [format "FLASH_KB(1FFFF7E0) = %u" [expr {$c(0) & 0xffff}]]
mem2array d 32 0x1FFFF7E8 3 ; echo [format "UID = %08x %08x %08x" $d(0) $d(1) $d(2)]
mem2array e 32 0x4002201C 1 ; echo [format "FMC_OBR(4002201C) = 0x%08x  (bit1=RDPRT: 1=zaschita)" $e(0)]
if {[catch {mem2array f 32 0x08000000 4} err]} {
  echo "FLASH 0x08000000 READ ERROR (vozmozhno RDP): $err"
} else {
  echo [format "FLASH[0..3] = %08x %08x %08x %08x" $f(0) $f(1) $f(2) $f(3)]
}
resume
echo "--- resumed, RDP-test done ---"
shutdown
