adapter driver bcm2835gpio
bcm2835gpio_peripheral_base 0x3F000000
bcm2835gpio_speed_coeffs 146203 36
bcm2835gpio_swd_nums 25 24
transport select swd
adapter speed 500
swd newdap chip cpu -enable
dap create chip.dap -chain-position chip.cpu
target create chip.cpu cortex_m -dap chip.dap
init
if {[catch {mem2array cr 32 0xE0042004 1; mww 0xE0042004 [expr {$cr(0) | 0x300}]} e]} {echo "wdt-freeze err: $e"}
halt
if {[catch {dump_image /home/pi/mower-swd/gd32-chip2-dump4.bin 0x08000000 0x40000} e]} {echo "DUMP ERR: $e"}
catch {resume}
echo "--- SAFE DUMP done (resumed) ---"
shutdown
