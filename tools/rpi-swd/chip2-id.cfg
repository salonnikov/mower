# ИДЕНТИФИКАЦИЯ второго чипа (гребёнка A) по SWD. ТОЛЬКО ЧТЕНИЕ. halt->read->resume.
adapter driver bcm2835gpio
bcm2835gpio_peripheral_base 0x3F000000
bcm2835gpio_speed_coeffs 146203 36
bcm2835gpio_swd_nums 25 24
transport select swd
adapter speed 100
swd newdap chip cpu -enable
dap create chip.dap -chain-position chip.cpu
target create chip.cpu cortex_m -dap chip.dap
init
halt
if {[catch {mem2array a 32 0xE000ED00 1; echo [format "CPUID(E000ED00) = 0x%08x (M0=C20x M3=C23x M4=C24x)" $a(0)]} e]} {echo "CPUID err: $e"}
if {[catch {mem2array b 32 0xE0042000 1; echo [format "DBG_ID(E0042000, STM32/GD32) = 0x%08x" $b(0)]} e]} {echo "DBG_ID err: $e"}
if {[catch {mem2array c 32 0x1FFFF7E0 1; echo [format "FLASH_KB(STM32/GD32 reg) = %u" [expr {$c(0) & 0xffff}]]} e]} {echo "flashKB err: $e"}
if {[catch {mem2array e 32 0x4002201C 1; echo [format "FMC_OBR = 0x%08x (bit1 RDPRT)" $e(0)]} e]} {echo "OBR err: $e"}
if {[catch {mem2array f 32 0x08000000 4; echo [format "FLASH@08000000 = %08x %08x %08x %08x" $f(0) $f(1) $f(2) $f(3)]} e]} {echo "FLASH read err (RDP?): $e"}
resume
echo "--- ID done, resumed ---"
shutdown
