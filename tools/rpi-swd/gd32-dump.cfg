# ДАМП флеша GD32F305 (1 МБ) -> файл. Только чтение флеша. Заморозка watchdog на время halt.
adapter driver bcm2835gpio
bcm2835gpio_peripheral_base 0x3F000000
bcm2835gpio_speed_coeffs 146203 36
bcm2835gpio_swd_nums 25 24
transport select swd
adapter speed 1000
swd newdap chip cpu -enable
dap create chip.dap -chain-position chip.cpu
target create chip.cpu cortex_m -dap chip.dap
init
mem2array cr 32 0xE0042004 1
mww 0xE0042004 [expr {$cr(0) | 0x300}]
echo "DBGMCU_CR set, WDT frozen on halt"
halt
dump_image /home/pi/mower-swd/gd32-dump.bin 0x08000000 0x100000
resume
echo "--- DUMP DONE, RESUMED ---"
shutdown
