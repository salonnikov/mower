# Mosquitto — стартовая конфигурация (ужесточить перед выносом наружу!)
listener 1883
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# На время отладки — анонимно. ДЛЯ ПРОДА: allow_anonymous false + password_file + TLS.
allow_anonymous true
# password_file /mosquitto/config/passwd
