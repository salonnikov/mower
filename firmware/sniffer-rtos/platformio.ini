; sniffer-2line-rtos — стабильный сниффер шлейфа косилки.
; FreeRTOS, 2 ядра: захват UART (ядро 1, реалтайм) развязан с Wi-Fi (ядро 0).
; Буфер StreamBuffer 48К переживает провалы Wi-Fi. Авто-реконнект. Не виснет.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCORE_DEBUG_LEVEL=1
