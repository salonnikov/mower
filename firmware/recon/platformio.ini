; Прошивка «пассажира-разведчика» — ESP32 WROOM-32, автономный логгер.
; Сборка только в контейнере (рантаймы не на хосте).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCORE_DEBUG_LEVEL=3
lib_deps =
  bblanchon/ArduinoJson @ ^7
  256dpi/MQTT @ ^2
  adafruit/Adafruit BNO08x @ ^1   ; или electroniccats/MPU6050, если ставим MPU6050
  kosme/arduinoFFT @ ^2           ; FFT по сигналу катушки (частота/период кода провода)

; Аналог только ADC1: катушка=GPIO36. ADC2 при Wi-Fi не работает.
; Выборка: adc_continuous (DMA). SD по SPI. Питание модуля — свой LiPo.
