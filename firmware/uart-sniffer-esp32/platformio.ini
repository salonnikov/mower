; Дуал-UART сниффер на ESP32 — слушает ОБЕ линии J1 (T и R) платы дисплея косилки.
; Стримит весь поток по TCP в контейнер-логгер + показывает на веб-странице.
; Сборка в контейнере.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCORE_DEBUG_LEVEL=2
