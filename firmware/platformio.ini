; Прошивка мозга косилки — ESP32-S3
; Сборка ТОЛЬКО в контейнере/CI (см. правила: рантаймы не на хосте).
;   docker run --rm -v $PWD:/p -w /p infinitecoding/platformio-for-vscode pio run

; АКТИВНАЯ цель — classic ESP32 WROOM-32 DevKit (то, что есть у пользователя).
[env:esp32dev]
platform = espressif32
board = esp32dev               ; ESP32 WROOM-32, 38-pin USB-C DevKit
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCORE_DEBUG_LEVEL=3
lib_deps =
  bblanchon/ArduinoJson @ ^7
  256dpi/MQTT @ ^2
  adafruit/Adafruit BNO08x @ ^1
  ; perimeter/motor (порт Ardumower Azurit) подключаются как vendored lib (GPL)

; Альтернатива — ESP32-S3 (если возьмём новый: лучше АЦП, PSRAM, больше ног).
[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM
lib_deps =
  bblanchon/ArduinoJson @ ^7
  256dpi/MQTT @ ^2
  adafruit/Adafruit BNO08x @ ^1

; ⚠️ ПРАВИЛА ПИНОВ для classic ESP32 (env:esp32dev) — см. также docs/02 §3a:
; - Аналог (катушка через ОУ, сенс контактов базы) — ТОЛЬКО ADC1: GPIO 36/39/34/35/32/33.
;   ADC2 НЕ использовать: он не работает при включённом Wi-Fi.
; - GPIO 34–39 — input-only (нет выхода, нет подтяжки): сюда датчики и АЦП, НЕ выходы.
; - Strapping (GPIO 0/2/12/15) — не вешать активное на старте.
; - Моторные PWM/DIR/enable — на обычные выходные пины (25/26/27/14/4/16/17/...).
; - Выборка катушки: adc_continuous/I2S-ADC (DMA) ~38–100 кГц, через ADC1.
; - PWM моторов: MCPWM/ledc (аппаратные). Питание платы: 5 В на VIN (НЕ 20 В).
