; mower-link — ESP32: 2 режима (переключаются на веб-странице):
;   SNIFF  — слушает обе линии J1 (T,R), стримит в логгер + веб.
;   BRIDGE — мост Wi-Fi<->UART к ESP32 косилки + держит P(IO0) низким,
;            чтобы с сервера снять дамп прошивки через esptool (socket://). Только чтение.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCORE_DEBUG_LEVEL=2
