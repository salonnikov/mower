; coil-scope — «осциллограф из ESP32»: смотрим родной сигнал провода периметра.
; Катушка из витой пары → GPIO36 (ADC1). Питание — повербанк по USB.
; Веб-морда показывает форму + спектр (FFT), частота/амплитуда уходят в MQTT.
; Сборка — в контейнере (рантаймы не на хосте):
;   docker run --rm -v $PWD:/p -w /p infinitecoding/platformio-for-vscode pio run -t upload

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  kosme/arduinoFFT @ ^2
