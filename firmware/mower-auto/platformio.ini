; mower-auto — ESP32 полностью автономно: подключается к домашнему Wi-Fi,
; дозванивается на VPS (data:7777 + control:7778), мостит UART косилки,
; P(GPIO5) управляется сервером ('0'=LOW для дампа, '1'=release для сниффа).
; Никаких веб-кнопок: контейнер на сервере сам решает режим.
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCORE_DEBUG_LEVEL=2
